name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ['22', '24']
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
      # the age binary is NOT a runtime dependency any more (typage is bundled, #64) —
      # it is installed here solely so selftest-interop.sh can assert CLI<->binary
      # format interop (X25519 + scrypt, both directions). Without it that test SKIPs.
      - name: install age (ubuntu, interop assertion only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y age
      - name: install age (macos, interop assertion only)
        if: runner.os == 'macOS'
        run: brew install age
      - name: install deps (arweave + arlocal for the arweave backend test)
        run: bun install --frozen-lockfile
      - name: verify (build + all selftests + CLI smoke)
        run: npm run verify
