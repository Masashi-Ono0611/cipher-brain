name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ['22', '24']
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.8
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: ${{ matrix.node }}
      # the age binary is NOT a runtime dependency any more (typage is bundled, #64) —
      # it is installed here solely so selftest-interop.sh can assert CLI<->binary
      # format interop (X25519 + scrypt, both directions). Without it that test SKIPs.
      - name: install age (ubuntu, interop assertion only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y age
      - name: install age (macos, interop assertion only)
        if: runner.os == 'macOS'
        run: brew install age
      # minisign is NOT a runtime dependency either (#214 — src/lib/minisign.ts
      # implements the wire format in-process, using only Node's own built-in
      # `crypto` Ed25519) — installed here solely so scripts/selftest-minisign.sh's
      # real-binary interop assertions actually run instead of SKIPping (same
      # posture as the `age` install steps above). Available via `apt-get` on
      # Ubuntu (universe) and via `brew` on macOS — no separate release-asset
      # download/checksum needed, unlike gitleaks below.
      - name: install minisign (ubuntu, interop assertion only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y minisign
      - name: install minisign (macos, interop assertion only)
        if: runner.os == 'macOS'
        run: brew install minisign
      # gitleaks is NOT a runtime dependency of the CLI either — it is installed here
      # solely so the --scan-secrets warn|deny selftest block (#215) actually exercises
      # the scan/warn/deny paths instead of silently [SKIP]-ing (the CLI itself only
      # requires gitleaks on PATH when an operator opts in with --scan-secrets). Pinned
      # to the same v8.30.1 used during local development, with a sha256 check on the
      # Linux tarball (no public apt/apt-get package exists for gitleaks) so a
      # compromised/mismatched release asset fails the job instead of silently running.
      # `-f` makes curl itself fail closed on a non-2xx HTTP response (a 404/500 body
      # would otherwise be written to gitleaks.tar.gz and only get caught one step
      # later, less clearly, by the checksum mismatch) — multi-model review suggestion.
      - name: install gitleaks (ubuntu, --scan-secrets test coverage only)
        if: runner.os == 'Linux'
        run: |
          curl -fsSL -o gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          rm -f gitleaks.tar.gz gitleaks
      # Unpinned (no per-version checksum) on macOS via brew, same accepted tradeoff
      # the "install age (macos, ...)" step above already makes — Homebrew does not
      # offer a straightforward way to pin+verify an exact historical formula version,
      # and this is a test-only auxiliary tool, not the shipped CLI (multi-model
      # review flagged the version-pin asymmetry with Linux; left as-is, matching
      # existing project precedent rather than introducing a new install mechanism).
      - name: install gitleaks (macos, --scan-secrets test coverage only)
        if: runner.os == 'macOS'
        run: brew install gitleaks
      - name: install deps (arweave + arlocal for the arweave backend test)
        run: bun install --frozen-lockfile
      # A dedicated, early step (not just typecheck's place inside `npm run verify`'s
      # chain) so a type error fails the job fast, before the slower selftest suite even
      # starts, and shows as its own distinct check in the Actions UI. `npm run verify`
      # below still runs `npm run typecheck` again as part of its chain — a few extra
      # seconds per matrix cell (strict tsc over ~3k lines is fast) traded for that
      # fail-fast/visibility property and for local-vs-CI parity (verify behaves
      # identically here and on a dev machine). tsc's own output is OS/node-invariant
      # (pure type-checking against one pinned @types/node, not runtime behavior), so
      # running it 4x (once per matrix cell) is a little redundant — but riding along on
      # the existing per-cell job is simpler than adding a 5th standalone job just to
      # dedupe a couple of CPU-seconds.
      - name: typecheck (strict tsc --noEmit)
        run: npm run typecheck
      # Check-only (non-mutating): fails the job on lint/format drift but never
      # writes to the tree. Same OS/node-invariance argument as typecheck above
      # (biome's output doesn't depend on the runner or Node version), so it rides
      # along on this per-cell job rather than getting a dedicated one.
      - name: lint (biome check, non-mutating)
        run: npm run lint
      # Runs the CLI straight off src/*.ts (scripts/dev-node-flags.mjs) — no build
      # step needed, and it fails fast, before the slower selftest suite, on the
      # same OS/node-invariance argument as typecheck/lint above (issue #227 part
      # 2: README.md's CLI reference must stay byte-identical to --help output).
      - name: docs sync check (README.md CLI reference vs --help, #227)
        run: npm run check:help-docs
      - name: verify (build + all selftests + CLI smoke)
        run: npm run verify
