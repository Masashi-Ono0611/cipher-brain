name: Publish

# Push a vX.Y.Z tag -> build, gate, and release to the npm registry via OIDC
# trusted publishing (no token, no manual 2FA), then create the GitHub Release.
# The package must have this repo + `publish.yml` registered as a Trusted
# Publisher on npmjs.com (one-time setup).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release
  id-token: write # OIDC token for npm trusted publishing

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.8

      # Node stays for the registry write: OIDC trusted publishing is an
      # npm-only mechanism (Bun has no tokenless OIDC path), so the final
      # registry write + the tarball smoke run on Node, while install /
      # build / test / gate run on Bun.
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - run: npm install -g npm@latest # OIDC trusted publishing needs npm >= 11.5.1
      - run: bun install --frozen-lockfile

      # selftest-interop.sh asserts CLI<->age-binary format interop; without
      # the binary that test SKIPs, and the release gate must not skip it.
      - name: install age (interop assertion only)
        run: sudo apt-get update && sudo apt-get install -y age

      # Guard: never release a version the tag does not match.
      - name: Verify tag matches package.json version
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          echo "package=$PKG tag=$TAG"
          [ "$PKG" = "$TAG" ] || { echo "::error::tag ${GITHUB_REF_NAME} != package.json ${PKG}"; exit 1; }

      # Full quality gate (build + all selftests + CLI/MCP smokes).
      - name: Verify gate
        run: bun run verify

      # Final pre-release gate: pack the tarball, install it, run both bins.
      - name: Tarball install + run smoke
        run: node scripts/tarball-smoke.mjs

      # OIDC trusted publishing (no token). Provenance DISABLED: its Sigstore
      # transparency-log step intermittently 409s on an internal retry and
      # stalls the release (seen on mira-harness). Tokenless OIDC auth is
      # unaffected.
      #
      # Prerelease tags (v1.2.3-rc1) go under the `next` dist-tag so they never
      # become `npm install`'s default; only GA tags take `latest`.
      - name: Release to the npm registry
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            NPM_CONFIG_PROVENANCE=false npm publish --tag next
          else
            NPM_CONFIG_PROVENANCE=false npm publish
          fi

      - name: Create GitHub Release
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes --prerelease
          else
            gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes --latest
          fi
        env:
          GH_TOKEN: ${{ github.token }}
